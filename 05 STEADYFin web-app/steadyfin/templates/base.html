<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}STEADYFin{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <header class="topbar">
    <div class="topbar__inner">
      <a class="brand" href="{{ url_for('home') }}">
        <span class="brand__mark">&#9749;</span>
        <span class="brand__name">STEADY<span class="brand__accent">Fin</span></span>
      </a>
      <nav class="nav">
        <a href="{{ url_for('home') }}" class="nav__link {% if request.path == '/' %}nav__link--active{% endif %}">Dashboard</a>
        <a href="{{ url_for('quarterly') }}" class="nav__link {% if request.path == '/quarterly' %}nav__link--active{% endif %}">Quarterly</a>
        <a href="{{ url_for('ai_suggestions') }}" class="nav__link {% if request.path == '/ai-suggestions' %}nav__link--active{% endif %}">AI Insights</a>
        <a href="{{ url_for('export_csv') }}" class="nav__link nav__link--cta">Export CSV</a>
      </nav>
    </div>
  </header>

  <main class="page">
    {% block content %}{% endblock %}
  </main>

  <footer class="footer">
    <p>STEADYFin &middot; Cash Flow Intelligence Pipeline &middot; {{ year }}</p>
  </footer>

  <script src="{{ url_for('static', filename='js/script.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
